body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f7f6f3;color:#1a1a18;font-size:14px;padding:16px 18px 48px}

/* topbar */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.tit{font-size:12px;font-weight:600;color:#999;letter-spacing:.07em;text-transform:uppercase}
.stats{display:flex;gap:16px}
.sn{font-size:19px;font-weight:600;line-height:1;text-align:center}
.sl{font-size:10px;color:#bbb;margin-top:2px;text-align:center}

/* ICE legend */
.ice-legend{font-size:11px;color:#aaa;background:#fff;border:.5px solid #e8e5de;border-radius:8px;padding:5px 10px;margin-bottom:14px;display:inline-flex;gap:8px;align-items:center;flex-wrap:wrap}
.ice-legend b{color:#555;font-weight:600}

/* filter tabs */
.filters{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.ftab{font-size:12px;font-weight:500;padding:5px 13px;border-radius:99px;border:1.5px solid #d8d5ce;color:#666;background:#fff;cursor:pointer;transition:all .12s}
.ftab:hover{border-color:#b0ada5}
.ftab.active-all{background:#1a1a18;color:#fff;border-color:#1a1a18}
.ftab.active-asap{background:#C0392B;color:#fff;border-color:#C0392B}
.ftab.active-next{background:#BA7517;color:#fff;border-color:#BA7517}
.ftab.active-backlog{background:#7a7872;color:#fff;border-color:#7a7872}

/* priority section */
.section{margin-bottom:20px}
.section.hidden{display:none}
.sec-header{display:flex;align-items:center;gap:9px;margin-bottom:9px}
.sec-pill{font-size:11px;font-weight:700;padding:3px 10px;border-radius:99px;letter-spacing:.04em}
.asap-pill{background:#FCEBEB;color:#A32D2D;border:1px solid #f0c0bf}
.next-pill{background:#FAEEDA;color:#854F0B;border:1px solid #e8d5aa}
.backlog-pill{background:#F1EFE8;color:#5F5E5A;border:1px solid #dddbd3}
.sec-count{font-size:11px;color:#bbb}
.sec-line{flex:1;height:.5px;background:#e0ddd5}

/* task cards */
.task{background:#fff;border-radius:10px;border:.5px solid #e0ddd5;margin-bottom:7px;overflow:hidden;transition:border-color .1s}
.task:hover{border-color:#c8c4bc}
.task-main{display:flex;align-items:flex-start;gap:10px;padding:10px 13px;cursor:pointer;user-select:none}
.task-body{flex:1;min-width:0}
.task-top{display:flex;align-items:flex-start;gap:8px;flex-wrap:wrap;margin-bottom:4px}
.task-name{font-size:13px;font-weight:500;line-height:1.35;flex:1;min-width:0}
.proj-badge{font-size:10px;font-weight:500;padding:2px 7px;border-radius:99px;white-space:nowrap;flex-shrink:0;margin-top:1px}
.acc-r{background:#FCEBEB;color:#A32D2D}
.acc-am{background:#FAEEDA;color:#854F0B}
.acc-te{background:#E1F5EE;color:#0F6E56}
.acc-gr{background:#F1EFE8;color:#5F5E5A}

/* ICE display */
.ice-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ice-score{font-size:12px;font-weight:700;color:#1a1a18;font-family:"SF Mono",monospace}
.ice-sep{font-size:11px;color:#ddd}
.ice-parts{font-size:10px;color:#aaa;font-family:"SF Mono",monospace;display:flex;gap:6px}
.ice-part{display:flex;align-items:center;gap:2px}
.ice-part span:first-child{color:#bbb;font-weight:500}
.ice-part span:last-child{color:#777;font-weight:600}
.tid{font-size:9px;color:#ccc;font-family:"SF Mono",monospace;margin-right:4px}

/* expand toggle */
.toggle-icon{font-size:11px;color:#ccc;flex-shrink:0;margin-top:2px;transition:transform .15s}
.toggle-icon.open{transform:rotate(180deg)}

/* checklist */
.checklist{padding:0 13px 10px 13px;border-top:.5px solid #f3f1ea;display:none}
.checklist.open{display:block}
.ch-item{display:flex;align-items:flex-start;gap:7px;padding:5px 0;border-bottom:.5px solid #f5f3ec;font-size:12px;color:#555;line-height:1.4}
.ch-item:last-child{border-bottom:none;padding-bottom:0}
.ch-box{width:13px;height:13px;border:.5px solid #c8c4bc;border-radius:3px;flex-shrink:0;margin-top:1px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:8px;color:#fff}

.no-ch{font-size:11px;color:#ccc;padding:6px 0}

.updated{font-size:11px;color:#ccc;text-align:center;margin-top:6px}

const PROJ = {
  "strategy":                {label:"Strategy",       acc:"acc-r"},
  "firemni-procesy":         {label:"Firemní procesy",acc:"acc-r"},
  "rb-universe-development": {label:"RB Universe",    acc:"acc-r"},
  "financni-tym":            {label:"Finanční tým",   acc:"acc-r"},
  "ma-odyssey":              {label:"M&A Odyssey",    acc:"acc-r"},
  "obchodni-podminky-rb-edu":{label:"Obch. podmínky", acc:"acc-am"},
  "kratky-potlesk":          {label:"Krátký potlesk", acc:"acc-te"},
  "vibe-coding":             {label:"Vibe coding",    acc:"acc-te"},
  "rb-network":              {label:"RB Network",     acc:"acc-gr"}
};

const PRIOS = ["ASAP","Next","Backlog"];
const PILL_CLASS = {ASAP:"asap-pill", Next:"next-pill", Backlog:"backlog-pill"};
const TAB_ACTIVE = {all:"active-all", ASAP:"active-asap", Next:"active-next", Backlog:"active-backlog"};

function ice(t){ return t.ice.i * t.ice.c * t.ice.e; }

let expanded = {};
let currentFilter = "all";

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.ftab').forEach(b => b.className = 'ftab');
  btn.className = 'ftab ' + TAB_ACTIVE[f];
  render();
}

function toggleTask(id) {
  expanded[id] = !expanded[id];
  const cl = document.getElementById('cl-' + id);
  const ic = document.getElementById('ti-' + id);
  if (cl) cl.className = 'checklist' + (expanded[id] ? ' open' : '');
  if (ic) ic.className = 'toggle-icon' + (expanded[id] ? ' open' : '');
}

function render() {
  const board = document.getElementById('board');
  board.innerHTML = '';

  let totals = {ASAP:0, Next:0, Backlog:0};
  TASKS.forEach(t => totals[t.p]++);
  document.getElementById('cnt-asap').textContent = totals.ASAP;
  document.getElementById('cnt-next').textContent = totals.Next;
  document.getElementById('cnt-bl').textContent = totals.Backlog;

  const showPrios = currentFilter === 'all' ? PRIOS : [currentFilter];

  showPrios.forEach(prio => {
    const tasks = TASKS.filter(t => t.p === prio).sort((a,b) => ice(b) - ice(a));
    if (!tasks.length) return;

    const sec = document.createElement('div');
    sec.className = 'section';

    sec.innerHTML = `
      <div class="sec-header">
        <span class="sec-pill ${PILL_CLASS[prio]}">${prio}</span>
        <span class="sec-count">${tasks.length} úkolů</span>
        <div class="sec-line"></div>
      </div>
    `;

    tasks.forEach(t => {
      const pr = PROJ[t.p_proj || t.proj] || {label: t.proj, acc:"acc-gr"};
      const proj = PROJ[t.proj] || {label: t.proj, acc:"acc-gr"};
      const score = ice(t);
      const hasCh = t.ch && t.ch.length > 0;

      const card = document.createElement('div');
      card.className = 'task';

      let chHtml = '';
      if (hasCh) {
        chHtml = `<div class="checklist${expanded[t.id]?' open':''}" id="cl-${t.id}">`;
        t.ch.forEach(c => {
          chHtml += `<div class="ch-item">
            <div class="ch-box${c.d?' done':''}">${c.d?'✓':''}</div>
            <span class="${c.d?'ch-done':''}">${c.t}</span>
          </div>`;
        });
        chHtml += '</div>';
      } else {
        chHtml = `<div class="checklist${expanded[t.id]?' open':''}" id="cl-${t.id}">
          <div class="no-ch">Bez checklistu</div>
        </div>`;
      }

      card.innerHTML = `
        <div class="task-main" onclick="toggleTask('${t.id}')">
          <div class="task-body">
            <div class="task-top">
              <span class="task-name"><span class="tid">${t.id}</span>${t.name}</span>
              <span class="proj-badge ${proj.acc}">${proj.label}</span>
            </div>
            <div class="ice-row">
              <span class="ice-score">ICE ${score}</span>
              <span class="ice-sep">·</span>
              <div class="ice-parts">
                <div class="ice-part"><span>I</span><span>${t.ice.i}</span></div>
                <div class="ice-part"><span>C</span><span>${t.ice.c}</span></div>
                <div class="ice-part"><span>E</span><span>${t.ice.e}</span></div>
              </div>
            </div>
          </div>
          <div class="toggle-icon${expanded[t.id]?' open':''}" id="ti-${t.id}">▾</div>
        </div>
        ${chHtml}
      `;

      sec.appendChild(card);
    });

    board.appendChild(sec);
  });
}

render();
</script>
